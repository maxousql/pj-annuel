name: Release production images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production API URL
        env:
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
        run: |
          if [ -z "$PRODUCTION_API_URL" ]; then
            echo "PRODUCTION_API_URL repository variable is required."
            exit 1
          fi
          case "$PRODUCTION_API_URL" in
            https://*) ;;
            *) echo "PRODUCTION_API_URL must use HTTPS."; exit 1 ;;
          esac
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository }}-api:${{ inputs.tag }}
      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          build-args: NEXT_PUBLIC_API_URL=${{ vars.PRODUCTION_API_URL }}
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository }}-web:${{ inputs.tag }}
