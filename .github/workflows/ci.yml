name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check environment template
        run: npm run env:check

      - name: Check formatting and types
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
