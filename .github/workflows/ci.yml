name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: content_ai_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d content_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AI_PROVIDER: mock
      API_PUBLIC_URL: http://127.0.0.1:4000
      AUTH_SECRET: ci-auth-secret-for-content-ai-at-least-32-characters
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/content_ai_test
      E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/content_ai_test
      DISABLE_SCHEDULED_JOBS: "true"
      FRONTEND_URL: http://127.0.0.1:3000
      INTEGRATION_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
      NODE_ENV: test
      RUN_DATABASE_INTEGRATION_TESTS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check environment template
        run: npm run env:check

      - name: Bootstrap Supabase-compatible PostgreSQL roles and extensions
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          create schema if not exists extensions;
          create extension if not exists pgcrypto with schema extensions;
          do $bootstrap$
          begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then create role anon nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'authenticated') then create role authenticated nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'service_role') then create role service_role nologin; end if;
          end
          $bootstrap$;
          SQL

      - name: Validate and apply migrations to ephemeral database
        run: npm run db:generate && npm run db:validate && npm run db:migrate

      - name: Verify upgrade with pre-existing duplicate data
        run: npm run db:verify-upgrade

      - name: Check migration status
        run: npm run db:status

      - name: Check formatting and types
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser journey
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Upload browser artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
